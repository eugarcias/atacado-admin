<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações | O Brabo</title>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/sidebar.css">
</head>
<body>
    <aside id="sidebar-container" class="menu"></aside>

    <main>
        <header>
            <h1 class="title">Configurações de Conta</h1>
            <p class="subtitle">Ajuste seu perfil no sistema Atacado Dashboard</p>
        </header>

        <div style="margin-top: 40px; background-color: #111217; padding: 30px; border-radius: 8px; border: 1px solid #1f2128; width: 500px;">
            <h2 style="font-size: 18px; margin-bottom: 20px;">Editar Perfil</h2>
            
            <form id="perfil-form" style="display: flex; flex-direction: column; gap: 15px;">
                <label style="color: #a1a1aa; font-size: 14px;">Nome de Exibição</label>
                <input type="text" value="Mauricio" style="padding: 10px; border-radius: 6px; border: 1px solid #1f2128; background: #0b0c10; color: white;">

                <label style="color: #a1a1aa; font-size: 14px;">Cargo / Negócio</label>
                <input type="text" value="Administrador" style="padding: 10px; border-radius: 6px; border: 1px solid #1f2128; background: #0b0c10; color: white;">

                <button type="submit" style="background-color: #7F0008; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px;">Salvar Alterações</button>
            </form>
        </div>
    </main>

    <script src="/js/main.js"></script>
</body>
</html>
