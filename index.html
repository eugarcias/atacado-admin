    <script src="/js/main.js" defer></script>
    <title>Dashboard</title>
</head>
<body>
    <aside class="menu">
        <div class="Logoo">
        <h1 class="Logo">Atacado Dashboard</h1>
        </div>
        <nav>
            <h3>Menu</h3>
            <ul>
            <li><a href="Dashboard.html"><i class="fi fi-rr-apps"></i>Dashboard</a></li>
            <li><a href="Clientes.html"><i class="fi fi-rr-users"></i>Clientes</a></li>
            <li><a href="Pedidos.html"><i class="fi fi-rr-shopping-cart">
            </i>Pedidos</a></li>
            </ul>
        </nav>
        <nav>
            <h3>Produtos</h3>
            <ul>
                <li><a href="Novo Produto.html"><i class="fi fi-rr-add"></i>Novo Produto</a></li>
                <li><a href="Coleções.html"><i class="fi fi-rr-book-open-cover"></i>Categorias</a></li>
                <li><a href="Estoque.html"><i class="fi fi-rr-home-location-alt"></i>Estoque</a></li>
            </ul>
        </nav>

    <main>
        <header>
            <h2>Dashboard</h2>
            <p>Visão geral do Brabo</p>
     </header>
         <section class="cards-grid">
             <article class="card">
                <div class="card-header">
                    <span class="card-title">Faturamento Mensal<span>
                        <i class="fi fi-rr-dollar"></i>
                    </div>
                    <div class="card-body">
                        <span class="card-value">R$ 20.000</span>
                        <span class="card-status"> +5.2% vs mês anterior</span>
                    </div>
            
                </article> 
                
                <article class="card">
                    <div class="card-header">
                    <span class="card-title">Pedidos</span>
                    <i class="fi fi-rr-shopping-cart"></i> 
                    </div>
                </article> 

                <article class="card">
                    <div class="card-header">
                    <span class="card-title">Ticket Médio</span>
                    <i class="fi fi-rr-dollar"></i>
                    </div>
                </article>  

                <article class="card">
                    <div class="card-header">
                    <span class="card-title">Clientes Ativos</span>
                    <i class="fi fi-rr-users"></i>
                    </div>
                </article>
            </section>
         
            <section class="card-grafico">
                <div>
                <span class="card-title">Vendas Mensais</span>
                <i class="fi fi-rr-chart-bar"></i>
                </div>
            </section>
    </main>
